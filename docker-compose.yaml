services:
  db:
    image: postgres:16-alpine
    container_name: book_designer_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_designer}
      POSTGRES_USER: ${POSTGRES_USER:-book_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-book_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-book_user} -d ${POSTGRES_DB:-book_designer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: book_designer_server
    env_file:
      - .env
    environment:
      DATA_DIR: ${DATA_DIR:-/app/data}
    ports:
      - "8000:8000"
    volumes:
      - server_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client/app-ui
    container_name: book_designer_client
    ports:
      - "8080:80"
    depends_on:
      - server

  ollama:
    image: ollama/ollama:latest
    container_name: book_designer_ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_CONTEXT_LENGTH: 2048

  ollama-warmup:
    image: curlimages/curl:latest
    container_name: book_designer_ollama_warmup
    profiles: ["llm"]
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      OLLAMA_WARMUP_TIMEOUT_SECONDS: ${OLLAMA_WARMUP_TIMEOUT_SECONDS:-300}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ./scripts/warmup_ollama.sh:/warmup_ollama.sh:ro
    command: ["sh", "/warmup_ollama.sh"]

volumes:
  postgres_data:
  server_data:
  ollama_data:
