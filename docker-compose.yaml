services:
  db:
    image: postgres:16-alpine
    container_name: book_designer_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_designer}
      POSTGRES_USER: ${POSTGRES_USER:-book_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-book_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-book_user} -d ${POSTGRES_DB:-book_designer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: book_designer_server
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://book_user:book_password@db:5432/book_designer}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-2048}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-320}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_STREAM: ${OLLAMA_STREAM:-false}
      LLM_TWO_PASS_ENABLED: ${LLM_TWO_PASS_ENABLED:-true}
      LLM_FAST_MODE: ${LLM_FAST_MODE:-false}
      SERVER_CORS_ORIGINS: ${SERVER_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
      DATA_DIR: ${DATA_DIR:-/app/data}
    ports:
      - "8000:8000"
    volumes:
      - server_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client/app-ui
    container_name: book_designer_client
    ports:
      - "8080:80"
    depends_on:
      - server

  ollama:
    image: ollama/ollama:latest
    container_name: book_designer_ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  server_data:
  ollama_data:
